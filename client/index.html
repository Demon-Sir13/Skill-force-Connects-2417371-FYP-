<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>SkillForce — Nepal's Premium Workforce Marketplace</title>
    <meta name="description" content="SkillForce is Nepal's premium platform connecting organizations with skilled service providers. Post jobs, hire talent, and grow your business." />
    <meta name="keywords" content="nepal, jobs, hire, service providers, organizations, skillforce, talent, workforce, kathmandu" />
    <meta name="author" content="SkillForce" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://skillforce.com.np" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skillforce.com.np" />
    <meta property="og:title" content="SkillForce — Nepal's Premium Workforce Marketplace" />
    <meta property="og:description" content="Post jobs, hire skilled providers, and manage your workforce — all in one premium platform." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="SkillForce" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkillForce — Hire Top Talent in Nepal" />
    <meta name="twitter:description" content="Post jobs, hire skilled providers, and manage your workforce." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#06090D" />
    <meta name="color-scheme" content="dark" />
    <meta name="application-name" content="SkillForce" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>
  <body class="bg-[#06090D] text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
